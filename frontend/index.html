<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchestra AI - Voice Orchestration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#2fd9f4",
                        "tertiary-fixed-dim": "#2fd9f4",
                        "on-tertiary-fixed-variant": "#004e5a",
                        "on-primary-fixed": "#001e2f",
                        "inverse-surface": "#dae2fd",
                        "tertiary-fixed": "#a2eeff",
                        "tertiary-container": "#00abc2",
                        "on-tertiary": "#00363e",
                        "surface-variant": "#2d3449",
                        "surface-tint": "#89ceff",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#131b2e",
                        "primary-fixed": "#c9e6ff",
                        "on-surface-variant": "#bec8d2",
                        "surface-container-high": "#222a3d",
                        "secondary": "#c0c1ff",
                        "on-primary-container": "#003751",
                        "background": "#0b1326",
                        "on-secondary": "#1000a9",
                        "outline": "#88929b",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "on-error": "#690005",
                        "primary-container": "#0ea5e9",
                        "outline-variant": "#3e4850",
                        "on-secondary-fixed": "#07006c",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#004c6e",
                        "on-primary": "#00344d",
                        "inverse-on-surface": "#283044",
                        "secondary-fixed-dim": "#c0c1ff",
                        "surface-container-highest": "#2d3449",
                        "surface-container-lowest": "#060e20",
                        "surface-container": "#171f33",
                        "primary": "#89ceff",
                        "on-tertiary-fixed": "#001f25",
                        "primary-fixed-dim": "#89ceff",
                        "secondary-fixed": "#e1e0ff",
                        "on-surface": "#dae2fd",
                        "surface-bright": "#31394d",
                        "secondary-container": "#3131c0",
                        "on-tertiary-container": "#003942",
                        "error-container": "#93000a",
                        "inverse-primary": "#006591"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "20px",
                        "xl": "32px",
                        "md": "16px",
                        "base": "4px",
                        "container-max": "1440px",
                        "lg": "24px",
                        "xs": "4px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "display-lg": ["Geist"],
                        "code-sm": ["Geist"],
                        "body-md": ["Inter"],
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "code-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #1e293b;
        }

        .luminous-outline {
            box-shadow: 0 0 15px rgba(137, 206, 255, 0.1);
        }

        .active-glow {
            box-shadow: 0 0 20px rgba(49, 49, 192, 0.25);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        .voice-active-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
